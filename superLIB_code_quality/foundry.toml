[profile.default]
# Compiler
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
via_ir = false
optimizer = true
optimizer_runs = 10000

# Testing
test = "test"
script = "script"
verbosity = 2
ffi = false
sender = "0x1804c8AB1F12E6bbf3894d4083f33e07309d1f38"
tx_origin = "0x1804c8AB1F12E6bbf3894d4083f33e07309d1f38"
initial_balance = "0xffffffffffffffffffffffff"
block_number = 1
chain_id = 31337
gas_limit = 9223372036854775807
gas_price = 0
block_base_fee_per_gas = 0
block_coinbase = "0x0000000000000000000000000000000000000000"
block_timestamp = 1
block_difficulty = 0

# Formatter - Strict style enforcement
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
hex_underscore = "remove"
single_line_statement_blocks = "preserve"
override_spacing = false
wrap_comments = true
ignore = ["src/external/**"]
contract_new_lines = true
sort_imports = true

# Linter rules
[lint]
# Informational (style)
screaming_snake_case_const = "warn"
screaming_snake_case_immutable = "warn"
mixed_case_function = "warn"
mixed_case_variable = "warn"
caps_const_name = "warn"
unused_import = "warn"

# Gas optimizations
asm_keccak256 = "warn"
unwrapped_modifier_logic = "warn"

# Security - treat as errors
incorrect_shift = "deny"
divide_before_multiply = "deny"

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false
call_override = false
dictionary_weight = 80
include_storage = true
include_push_bytes = true

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x3e8"
dictionary_weight = 40
include_storage = true
include_push_bytes = true

# CI Profile - faster, stricter
[profile.ci]
verbosity = 3
fuzz = { runs = 512 }
invariant = { runs = 512, depth = 20 }

# Production build - max optimization
[profile.production]
optimizer = true
optimizer_runs = 1000000
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

# Documentation
[doc]
out = "docs/forge-doc"
repository = "https://github.com/mrheyday/superLIB"
title = "SuperLIB Protocol"

# Etherscan verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
optimism = { key = "${OPTIMISM_API_KEY}" }
polygon = { key = "${POLYGONSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }

# RPC endpoints
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
base = "${BASE_RPC_URL}"
localhost = "http://127.0.0.1:8545"
