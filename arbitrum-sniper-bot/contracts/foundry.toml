[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.36"
evm_version = "osaka"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

[profile.ci]
fuzz.runs = 10000
invariant.runs = 1000

[lint]
lint_on_build = true
severity = ["high", "med"]

[fmt]
line_length = 120
wrap_comments = true

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}" }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}" }
