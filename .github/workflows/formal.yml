name: ORCH-H Formal Verification
on:
  push:
    branches: [ main ]
  pull_request:
env:
  SOLC_VERSION: 0.8.28
jobs:
  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install solc
        uses: ethereum/solidity-action@v1
        with:
          version: ${{ env.SOLC_VERSION }}
      - name: Install Scribble
        run: npm install -g eth-scribble
      - name: Scribble instrument (repo)
        run: |
          scribble contracts --output-mode files --output-dir scribble-out
      - name: Compile scribble-out
        run: |
          solc --version
          shopt -s globstar
          solc --optimize --base-path . --include-path node_modules scribble-out/**/*.sol
      - name: Certora (optional)
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "CERTORAKEY not set; skipping certoraRun."
            exit 0
          fi
          certoraRun certora/certora.conf --msg "ORCH-H CI verification"
